# === 第五部分：兜底规则 ===
# 任何没有被上面规则抓到的流量，默认走全球最快节点
FINAL,GLOBAL_FAST

[Host]
localhost = 127.0.0.1

https://monica.im/en/tools/rewrite-text
^https?://(www.)?g.cn($|/.*) https://www.google.com$2 302
^https?://(www.)?google.cn($|/.*) https://www.google.com$2 302
